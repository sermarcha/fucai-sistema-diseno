<!-- ============================================================
  FUCAI — Bloque de cifras animadas (contadores)
  Pegar COMPLETO en un Bloque de código (tipo HTML) de Squarespace.
  Sección: «01 Somos FUCAI» de Inicio. Ver GUIA-SQUARESPACE.md §8.

  Para cambiar las cifras edita SOLO:
   - data-target  → valor final del contador (número entero)
   - data-suffix  → sufijo que acompaña al número («+», «», …)
   - el texto de <span class="fucai-cifra-label">…</span>
  No toques el resto.
============================================================ -->
<div class="fucai-cifras" role="list" aria-label="Cifras de FUCAI">
  <div class="fucai-cifra" role="listitem">
    <span class="fucai-cifra-num" data-target="30" data-suffix="+">0</span>
    <span class="fucai-cifra-label">Años caminando<br>con comunidades</span>
  </div>
  <div class="fucai-cifra" role="listitem">
    <span class="fucai-cifra-num" data-target="4" data-suffix="">0</span>
    <span class="fucai-cifra-label">Territorios<br>de trabajo</span>
  </div>
  <div class="fucai-cifra" role="listitem">
    <span class="fucai-cifra-num" data-target="7" data-suffix="">0</span>
    <span class="fucai-cifra-label">Líneas<br>de enfoque</span>
  </div>
</div>

<style>
  .fucai-cifras {
    display: flex;
    gap: 48px;
    flex-wrap: wrap;
    border-top: 1px solid rgba(0, 0, 0, 0.15);
    padding-top: 24px;
  }
  .fucai-cifra {
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-width: 120px;
  }
  .fucai-cifra-num {
    font-family: 'Space Grotesk', 'Arial Black', sans-serif;
    font-weight: 700;
    font-size: clamp(44px, 5.5vw, 72px);
    line-height: 1;
    letter-spacing: -0.03em;
    color: #E94513;
    font-variant-numeric: tabular-nums;
  }
  .fucai-cifra-label {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11.5px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: #666666;
    line-height: 1.5;
  }
  @media (max-width: 640px) {
    .fucai-cifras { gap: 28px; }
  }
</style>

<script>
(function () {
  var DURATION = 1400; // ms
  var reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var nums = document.querySelectorAll('.fucai-cifra-num');

  function setFinal(el) {
    el.textContent = el.getAttribute('data-target') + (el.getAttribute('data-suffix') || '');
  }

  function animate(el) {
    var target = parseInt(el.getAttribute('data-target'), 10) || 0;
    var suffix = el.getAttribute('data-suffix') || '';
    var start = null;
    function easeOut(t) { return 1 - Math.pow(1 - t, 3); }
    function step(ts) {
      if (!start) start = ts;
      var p = Math.min((ts - start) / DURATION, 1);
      el.textContent = Math.round(easeOut(p) * target) + (p === 1 ? suffix : '');
      if (p < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }

  if (reduced || !('IntersectionObserver' in window)) {
    nums.forEach(setFinal);
    return;
  }

  var seen = new WeakSet();
  var io = new IntersectionObserver(function (entries) {
    entries.forEach(function (e) {
      if (e.isIntersecting && !seen.has(e.target)) {
        seen.add(e.target);
        animate(e.target);
        io.unobserve(e.target);
      }
    });
  }, { threshold: 0.4 });

  nums.forEach(function (el) { io.observe(el); });
})();
</script>
